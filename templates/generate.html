<!DOCTYPE html>
<html>

<head>
    <title>Generate Report</title>

    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-success text-white">

<h3>Generate Report</h3>

</div>

<div class="card-body">

<form method="POST" action="/generate">

    <!-- IMPORTANT: This sends the template path -->
    <input
        type="hidden"
        name="template_path"
        value="{{ template_path }}">

{% for field in placeholders %}

<div class="mb-3">

<label class="form-label">

<b>{{ field.replace("_"," ").title() }}</b>

</label>

{% if "address" in field %}

<textarea
    class="form-control"
    rows="4"
    name="{{ field }}"
    required></textarea>

{% elif "date" in field %}

<input
    type="date"
    class="form-control"
    name="{{ field }}"
    required>

{% else %}

<input
    type="text"
    class="form-control"
    name="{{ field }}"
    required>

{% endif %}

</div>

{% endfor %}

<button class="btn btn-success">

Generate Word Report

</button>

</form>

</div>

</div>

</div>

</body>

</html>
