<!DOCTYPE html>
<html>
<head>
    <title>Generate Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

<h2>Generate Report</h2>

<form method="POST" action="/generate">
    <input
type="hidden"
name="template_path"
value="{{ template_path }}">

{% for field in placeholders %}

<div class="mb-3">

<label class="form-label">
<b>{{ field }}</b>
</label>

{% if "address" in field %}

<textarea
class="form-control"
rows="4"
name="{{ field }}"></textarea>

{% elif "date" in field %}

<input
type="date"
class="form-control"
name="{{ field }}">

{% else %}

<input
type="text"
class="form-control"
name="{{ field }}">

{% endif %}

</div>

{% endfor %}

<button class="btn btn-success">
Generate Word Report
</button>

</form>

</div>

</body>
</html>
